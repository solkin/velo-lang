<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gravity Defied — Track Studio</title>
<style>
  /* ---- strict corporate design tokens ------------------------------------ */
  :root {
    --bg: #eef1f4;
    --panel: #ffffff;
    --panel-2: #f7f8fa;
    --border: #d8dde3;
    --border-strong: #c2c9d2;
    --text: #1d2330;
    --muted: #667085;
    --muted-2: #8a93a2;
    --accent: #1f4e8c;
    --accent-hover: #163b6b;
    --accent-soft: #e8eef7;
    --danger: #b3261e;
    --danger-soft: #fbeceb;
    --ok: #1f7a4d;
    --warn: #8a5a00;
    --warn-soft: #fbf3e2;
    --l0: #2f6f4f; --l0-soft: #e7f1eb;
    --l1: #8a5a00; --l1-soft: #f6efe1;
    --l2: #7a2e2e; --l2-soft: #f4e7e7;
    --radius: 4px;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12161c; --panel: #1a1f27; --panel-2: #20262f;
      --border: #2c333d; --border-strong: #3a424e;
      --text: #e6e9ee; --muted: #9aa4b2; --muted-2: #77808e;
      --accent: #5b8fd6; --accent-hover: #7aa6e2; --accent-soft: #22304a;
      --danger: #e06a63; --danger-soft: #3a2422;
      --ok: #5cbf8f; --warn: #d9a441; --warn-soft: #33301f;
      --l0: #7dc6a1; --l0-soft: #223027;
      --l1: #d9a441; --l1-soft: #332c1c;
      --l2: #d98a8a; --l2-soft: #33242422;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---- app bar ----------------------------------------------------------- */
  .appbar {
    display: flex; align-items: center; gap: 16px;
    height: 48px; padding: 0 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex: none;
  }
  .brand { display: flex; align-items: baseline; gap: 8px; font-weight: 600; letter-spacing: .2px; }
  .brand .mark { color: var(--accent); font-weight: 700; }
  .brand .sub { color: var(--muted); font-weight: 400; font-size: 12px; }
  .appbar-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }

  /* ---- buttons & controls ------------------------------------------------ */
  button {
    font-family: inherit; font-size: 12px; color: var(--text);
    background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 6px 11px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; line-height: 1;
    transition: background .12s, border-color .12s;
  }
  button:hover { background: var(--panel-2); border-color: var(--muted-2); }
  button:active { background: var(--border); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  button.ghost { border-color: transparent; background: transparent; }
  button.ghost:hover { background: var(--panel-2); }
  button.danger { color: var(--danger); border-color: var(--border-strong); }
  button.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  button.sm { padding: 3px 7px; font-size: 11px; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.toggle.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

  input[type=text], input[type=number], select {
    font-family: inherit; font-size: 12px; color: var(--text);
    background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 5px 8px; width: 100%;
  }
  input:focus, select:focus { outline: 2px solid var(--accent-soft); outline-offset: -1px; border-color: var(--accent); }
  input[type=number] { font-family: var(--mono); }
  label.field { display: flex; flex-direction: column; gap: 3px; font-size: 11px; color: var(--muted); }
  .sep { width: 1px; height: 22px; background: var(--border); }

  /* ---- workspace --------------------------------------------------------- */
  .workspace { flex: 1; display: flex; min-height: 0; }

  /* sidebar */
  .sidebar { width: 288px; flex: none; background: var(--panel); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; min-height: 0; }
  .sidebar-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
                  border-bottom: 1px solid var(--border); font-weight: 600; text-transform: uppercase;
                  letter-spacing: .5px; font-size: 11px; color: var(--muted); }
  .count-chip { background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px;
                padding: 1px 8px; font-weight: 600; color: var(--text); }
  .track-list { list-style: none; margin: 0; padding: 6px; overflow-y: auto; flex: 1; }
  .track-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--radius);
                cursor: pointer; border: 1px solid transparent; }
  .track-item:hover { background: var(--panel-2); }
  .track-item.sel { background: var(--accent-soft); border-color: var(--accent); }
  .track-idx { font-family: var(--mono); font-size: 11px; color: var(--muted-2); width: 20px; text-align: right; flex: none; }
  .track-main { flex: 1; min-width: 0; }
  .track-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
  .track-actions { display: none; gap: 2px; flex: none; }
  .track-item:hover .track-actions, .track-item.sel .track-actions { display: flex; }
  .badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; letter-spacing: .3px; }
  .badge.l0 { color: var(--l0); background: var(--l0-soft); }
  .badge.l1 { color: var(--l1); background: var(--l1-soft); }
  .badge.l2 { color: var(--l2); background: var(--l2-soft); }
  .sidebar-empty { padding: 24px 16px; color: var(--muted); text-align: center; font-size: 12px; line-height: 1.6; }

  /* editor */
  .editor { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .editor-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
                 border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  .editor-head .name-in { width: 180px; }
  .editor-head .league-in { width: 132px; }
  .toolbar { display: flex; align-items: center; gap: 6px; margin-left: auto; flex-wrap: wrap; }
  .editor-body { flex: 1; display: flex; min-height: 0; }
  .canvas-wrap { flex: 1; position: relative; background:
      repeating-linear-gradient(0deg, transparent, transparent 23px, rgba(128,128,128,.05) 23px, rgba(128,128,128,.05) 24px),
      repeating-linear-gradient(90deg, transparent, transparent 23px, rgba(128,128,128,.05) 23px, rgba(128,128,128,.05) 24px),
      var(--panel-2);
      min-width: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }
  .canvas-wrap.pan canvas { cursor: grab; }
  .canvas-hud { position: absolute; left: 10px; bottom: 10px; font-family: var(--mono); font-size: 11px;
                color: var(--muted); background: color-mix(in srgb, var(--panel) 80%, transparent);
                border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 8px; pointer-events: none; }
  .canvas-legend { position: absolute; right: 10px; top: 10px; display: flex; flex-direction: column; gap: 4px;
                   font-size: 11px; color: var(--muted); background: color-mix(in srgb, var(--panel) 80%, transparent);
                   border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 9px; pointer-events: none; }
  .canvas-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 6px; vertical-align: -1px; }

  .side-forms { width: 300px; flex: none; border-left: 1px solid var(--border); background: var(--panel);
                display: flex; flex-direction: column; min-height: 0; }
  .form-block { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .form-block h3 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hint { font-size: 11px; color: var(--muted-2); margin-top: 8px; line-height: 1.5; }

  .points-block { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .points-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px 6px; }
  .points-head h3 { margin: 0; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); font-weight: 600; }
  .points-scroll { overflow-y: auto; flex: 1; padding: 0 8px 10px; }
  table.pts { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
  table.pts th { position: sticky; top: 0; background: var(--panel); color: var(--muted); font-weight: 600;
                 text-align: right; padding: 4px 6px; border-bottom: 1px solid var(--border); z-index: 1; }
  table.pts th.n { text-align: center; }
  table.pts td { padding: 1px 3px; border-bottom: 1px solid var(--panel-2); }
  table.pts td.n { text-align: center; color: var(--muted-2); }
  table.pts tr.sel td { background: var(--accent-soft); }
  table.pts tr.drop td { background: var(--danger-soft); }
  table.pts input { padding: 2px 4px; text-align: right; }
  table.pts .rm { color: var(--danger); cursor: pointer; padding: 0 4px; text-align: center; user-select: none; }

  /* status bar */
  .statusbar { flex: none; height: 30px; display: flex; align-items: center; gap: 14px;
               padding: 0 14px; background: var(--panel); border-top: 1px solid var(--border);
               font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .statusbar .ok { color: var(--ok); }
  .statusbar .warn { color: var(--warn); }
  .statusbar .err { color: var(--danger); }
  .statusbar .spacer { margin-left: auto; }

  .editor-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
                  gap: 10px; color: var(--muted); }
  .editor-empty .big { font-size: 15px; font-weight: 600; color: var(--text); }

  /* modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,20,28,.5); display: none;
                    align-items: center; justify-content: center; z-index: 50; }
  .modal-backdrop.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border-strong); border-radius: 6px;
           width: 560px; max-width: 92vw; max-height: 86vh; display: flex; flex-direction: column;
           box-shadow: 0 12px 40px rgba(0,0,0,.28); }
  .modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; align-items: center; }
  .modal-head .x { margin-left: auto; }
  .modal-body { padding: 8px 10px; overflow-y: auto; }
  .modal-foot { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  .modal-foot .spacer { margin-left: auto; }
  .pick-toolbar { display: flex; gap: 8px; align-items: center; padding: 6px 10px; color: var(--muted); font-size: 11px; }
  .pick-list { list-style: none; margin: 0; padding: 0; }
  .pick-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: var(--radius); }
  .pick-item:hover { background: var(--panel-2); }
  .pick-item input { width: auto; }
  .pick-item .pn { flex: 1; font-weight: 600; }
  .pick-item .pm { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .file-hidden { display: none; }
  .kbd { font-family: var(--mono); background: var(--panel-2); border: 1px solid var(--border); border-radius: 3px; padding: 0 4px; font-size: 10px; }

  /* ---- Play (test-drive) overlay ---------------------------------------- */
  .play-btn { color: var(--ok); border-color: var(--border-strong); font-weight: 600; }
  .play-btn:hover { background: var(--l0-soft); border-color: var(--ok); }
  .play-overlay { position: fixed; inset: 0; z-index: 60; display: none; flex-direction: column; background: #0b0e13; }
  .play-overlay.show { display: flex; }
  .play-bar { display: flex; align-items: center; gap: 12px; height: 46px; padding: 0 14px;
              background: var(--panel); border-bottom: 1px solid var(--border); flex: none; }
  .play-bar .play-title { font-weight: 600; }
  .play-bar .play-hint { color: var(--muted); font-size: 11px; }
  .play-bar .play-league { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); margin-left: auto; }
  .play-bar .play-league select { width: auto; }
  .play-canvas-wrap { flex: 1; position: relative; min-height: 0; }
  #playCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; background: #fff; touch-action: none; }
  .play-touch { position: absolute; bottom: 18px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; }
  .play-touch .grp { display: flex; gap: 12px; }
  .play-touch button { pointer-events: auto; width: 58px; height: 58px; border-radius: 50%; font-size: 20px;
                       display: flex; align-items: center; justify-content: center; padding: 0; gap: 0; line-height: 1;
                       opacity: .82; background: var(--panel); border: 1px solid var(--border-strong); color: var(--text); }
  .play-touch button:active { background: var(--accent-soft); border-color: var(--accent); }
</style>
</head>
<body>
  <header class="appbar">
    <div class="brand"><span class="mark">▲</span> Gravity Defied <span class="sub">Track Studio</span></div>
    <div class="appbar-actions">
      <button id="btnImportMrg" title="Import an original levels.mrg">Import .mrg…</button>
      <button id="btnImportVel" title="Load an existing tracks.vel">Import tracks.vel…</button>
      <button id="btnNew">New track</button>
      <div class="sep"></div>
      <button id="btnExport" class="primary" title="Download tracks.vel for the sample">Export tracks.vel</button>
    </div>
  </header>

  <main class="workspace">
    <aside class="sidebar">
      <div class="sidebar-head">Project tracks <span class="count-chip" id="trackCount">0</span>
        <button id="btnClearAll" class="ghost sm danger" style="margin-left:auto" title="Remove all tracks">Clear</button>
      </div>
      <ul class="track-list" id="trackList"></ul>
    </aside>

    <section class="editor" id="editor"></section>
  </main>

  <footer class="statusbar" id="status">
    <span id="statusMain">Ready.</span>
    <span class="spacer"></span>
    <span id="statusHint">Y is up (solid ground below) · X strictly increases left→right · start on/above surface · point ×8192 → engine units</span>
  </footer>

  <!-- import picker modal -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-head"><span id="modalTitle">Import tracks</span><button class="ghost sm x" id="modalX">✕</button></div>
      <div class="pick-toolbar">
        <button class="sm ghost" id="pickAll">Select all</button>
        <button class="sm ghost" id="pickNone">Select none</button>
        <span id="pickInfo" style="margin-left:auto"></span>
      </div>
      <div class="modal-body"><ul class="pick-list" id="pickList"></ul></div>
      <div class="modal-foot">
        <span id="pickCount" style="color:var(--muted)"></span>
        <span class="spacer"></span>
        <button id="pickCancel">Cancel</button>
        <button id="pickReplace">Replace project</button>
        <button id="pickAdd" class="primary">Add selected</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileMrg" class="file-hidden" accept=".mrg,application/octet-stream">
  <input type="file" id="fileVel" class="file-hidden" accept=".vel,text/plain">

  <!-- Play (test-drive) overlay: authentic engine, 1:1 physics -->
  <div class="play-overlay" id="playOverlay">
    <div class="play-bar">
      <span class="play-title" id="playTitle">Track</span>
      <span class="play-hint">↑/W gas · ↓/S brake · ←/→ lean · R restart · Esc exit</span>
      <label class="play-league">Bike league
        <select id="playLeague"><option value="0">1</option><option value="1">2</option><option value="2">3</option><option value="3">4</option></select>
      </label>
      <button class="sm" id="playRestart">Restart</button>
      <button class="sm primary" id="playExit">Exit ▶</button>
    </div>
    <div class="play-canvas-wrap">
      <canvas id="playCanvas"></canvas>
      <div class="play-touch">
        <div class="grp"><button data-btn="leanB" title="lean back">⟲</button><button data-btn="leanF" title="lean forward">⟳</button></div>
        <div class="grp"><button data-btn="brake" title="brake">▼</button><button data-btn="gas" title="gas">▲</button></div>
      </div>
    </div>
  </div>

<script>
"use strict";
/* =========================================================================
   Gravity Defied — Track Studio
   A single-file authoring tool that produces the sample's `tracks.vel`.

   Data model (one entry per track):
     { name, league(0..2),
       startX, startY, finishX, finishY,   // engine/tracks.vel units (raw*8192)
       points: [{x,y}, ...] }              // RAW units, exactly as in tracks.vel

   Coordinate spaces (verified against engine.vel):
     - tracks.vel stores each point in RAW units (small ints).
     - The engine scales a point on load as (v<<16)>>3  ==  v * 8192.
     - start/finish in tracks.vel are already in the *scaled* space, so a raw
       grid position g maps to a field value g*8192. The canvas therefore draws
       every point at (x, y) and each flag at (field/8192).
   ========================================================================= */
const SCALE = 1 << 13;            // 8192  == (1<<16)>>3
const LEAGUE_NAMES = ["Beginner", "Skilled", "Pro"];
const MAX_VALID_TRACKS = 4096;    // header sanity guard (Reader.MAX_VALID_TRACKS analogue)

let project = [];                 // array of track objects
let sel = -1;                     // selected track index
let selPoint = -1;                // selected point index within the track

/* ---- small helpers ----------------------------------------------------- */
const $ = (id) => document.getElementById(id);
const clampL = (l) => (l < 0 ? 0 : l > 2 ? 2 : l | 0);
function escVelStr(s) { return String(s).replace(/\\/g, "\\\\").replace(/"/g, '\\"'); }
function cur() { return sel >= 0 && sel < project.length ? project[sel] : null; }

function newTrack(name) {
  // Start sits a little ABOVE the flat surface (Y-up), so the bike drops and lands.
  return { name: name || "New Track", league: 0,
           startX: -150 * SCALE, startY: 20 * SCALE, finishX: 380 * SCALE, finishY: 0,
           points: [ {x:-200,y:0}, {x:-100,y:0}, {x:0,y:0}, {x:150,y:0}, {x:280,y:0}, {x:420,y:0} ] };
}

/* =========================================================================
   .mrg  binary parser  (faithful port of Reader.readHeader + Level.readTrackData)
   DataInputStream is big-endian; bytes are signed.
   ========================================================================= */
function decodeCp1251(bytes) {
  try { return new TextDecoder("windows-1251").decode(new Uint8Array(bytes)); }
  catch (e) { return bytes.map((b) => String.fromCharCode(b)).join(""); }
}

function parseMrg(buffer) {
  const dv = new DataView(buffer);
  let off = 0;
  const len = dv.byteLength;
  const need = (n) => { if (off + n > len) throw new Error("unexpected end of file at " + off); };
  const rInt = () => { need(4); const v = dv.getInt32(off); off += 4; return v; };
  const rShort = () => { need(2); const v = dv.getInt16(off); off += 2; return v; };
  const rU8 = () => { need(1); return dv.getUint8(off++); };
  const rI8 = () => { need(1); return dv.getInt8(off++); };

  // ---- header: exactly 3 leagues ----
  const meta = [];                // {league, name, pointer}
  for (let i = 0; i < 3; i++) {
    const count = rInt();
    if (count < 0 || count > MAX_VALID_TRACKS) throw new Error("Level file is not valid (bad count " + count + ")");
    for (let j = 0; j < count; j++) {
      const pointer = rInt();
      const buf = [];
      for (let n = 0; ; n++) {
        if (n >= 40) break;       // Reader caps names at 40 bytes
        const b = rU8();
        if (b === 0) break;
        buf.push(b);
      }
      const name = decodeCp1251(buf).replace(/_/g, " ");
      meta.push({ league: i, name, pointer });
    }
  }
  const headerEnd = off;

  // ---- one track body, read at the current offset ----
  function readTrackData(m) {
    const ver = rI8();            // version byte, always consumed
    if (ver === 50) off += 20;    // '2' → 20-byte extra header
    const startX = rInt(), startY = rInt(), finishX = rInt(), finishY = rInt();
    const pointsCount = rShort();
    if (pointsCount < 1 || pointsCount > 65535) throw new Error("insane point count " + pointsCount);
    const points = [];
    let k1 = rInt(), l1 = rInt();
    points.push({ x: k1, y: l1 });
    for (let i = 1; i < pointsCount; i++) {
      const b0 = rI8();
      let x, y;
      // escape: the next point is given as ABSOLUTE coords (k1,l1 := x,y), NOT a delta.
      // Verified against the real levels.mrg: treating it as a delta makes escape-using
      // tracks (Slope, Deep, Cliff, Original, Indoor, Pillar) non-monotonic and broken.
      if (b0 === -1) { k1 = 0; l1 = 0; x = rInt(); y = rInt(); }
      else { x = b0; y = rI8(); }                // else: signed byte deltas
      k1 += x; l1 += y;
      points.push({ x: k1, y: l1 });
    }
    return { name: m.name, league: m.league, startX, startY, finishX, finishY, points };
  }

  // Strategy: read tracks sequentially from the end of the header (GD stores the
  // data section contiguously, in header order). If that desyncs, retry using the
  // header pointer as an absolute file offset.
  const tracks = [];
  let mode = "sequential";
  try {
    off = headerEnd;
    for (const m of meta) tracks.push(readTrackData(m));
  } catch (seqErr) {
    tracks.length = 0;
    mode = "pointer";
    for (const m of meta) { off = m.pointer; tracks.push(readTrackData(m)); }
  }
  return { tracks, mode, count: meta.length };
}

/* =========================================================================
   tracks.vel  text parser  (round-trips this tool's own output and hand edits)
   ========================================================================= */
function parseTracksVel(text) {
  const tracks = [];
  // names: func name(int i) ... if (i == N) { return "STR" };
  const names = {};
  const reName = /if\s*\(\s*i\s*==\s*(\d+)\s*\)\s*\{\s*return\s*"((?:\\.|[^"\\])*)"\s*\}/g;
  let m;
  while ((m = reName.exec(text)) !== null) {
    names[+m[1]] = m[2].replace(/\\"/g, '"').replace(/\\\\/g, "\\");
  }
  // trackData: if (i == N) { return new array[int]{ ints } }
  const reData = /if\s*\(\s*i\s*==\s*(\d+)\s*\)\s*\{\s*return\s+new\s+array\[int\]\s*\{([^}]*)\}/g;
  const rows = [];
  while ((m = reData.exec(text)) !== null) {
    const idx = +m[1];
    const nums = m[2].split(",").map((s) => s.trim()).filter((s) => s.length).map(Number);
    if (nums.some((n) => Number.isNaN(n))) continue;
    rows.push({ idx, nums });
  }
  rows.sort((a, b) => a.idx - b.idx);
  for (const r of rows) {
    const a = r.nums;
    if (a.length < 6) continue;
    const league = clampL(a[0]);
    const startX = a[1], startY = a[2], finishX = a[3], finishY = a[4];
    const pc = a[5];
    const points = [];
    for (let k = 0; k < pc; k++) {
      const bx = 6 + k * 2, by = bx + 1;
      if (by >= a.length) break;
      points.push({ x: a[bx], y: a[by] });
    }
    tracks.push({ name: names[r.idx] || ("Track " + r.idx), league, startX, startY, finishX, finishY, points });
  }
  return tracks;
}

/* =========================================================================
   tracks.vel  generator  (matches the original file's layout exactly)
   ========================================================================= */
function generateTracksVel(tracks) {
  const n = tracks.length;
  const L = [];
  L.push("# Gravity Defied — track data, " + n + " tracks in 3 leagues. Produced by track-editor.html.");
  L.push("# Each track is a flat int array: [league, startX, startY, finishX, finishY, pointCount, x0,y0, x1,y1, ...]");
  L.push("# Point coordinates are the original raw units; the engine scales them by (v<<16)>>3 on load.");
  L.push("");
  L.push("class Tracks() {");
  L.push("    func count() int { return " + n + " }");
  L.push("");
  L.push("    func name(int i) str {");
  tracks.forEach((t, i) => L.push('        if (i == ' + i + ') { return "' + escVelStr(t.name) + '" };'));
  L.push('        return "?"');
  L.push("    }");
  L.push("");
  L.push("    func league(int i) int {");
  tracks.forEach((t, i) => L.push("        if (i == " + i + ") { return " + clampL(t.league) + " };"));
  L.push("        return 0");
  L.push("    }");
  L.push("");
  L.push("    func trackData(int i) array[int] {");
  tracks.forEach((t, i) => {
    const arr = [clampL(t.league), t.startX | 0, t.startY | 0, t.finishX | 0, t.finishY | 0, t.points.length];
    for (const p of t.points) { arr.push(p.x | 0, p.y | 0); }
    L.push("        if (i == " + i + ") { return new array[int]{ " + arr.join(", ") + " } };");
  });
  L.push("        return new array[int]{ 0, 0, 0, 0, 0, 0 }");
  L.push("    }");
  L.push("}");
  return L.join("\n") + "\n";
}

/* =========================================================================
   Validation (mirrors engine.vel Track.load monotonic-x filtering)
   ========================================================================= */
// Surface Y (raw) at raw x over the engine's kept points — mirrors Track.surfaceAtPoint.
function surfaceRawAt(kept, x) {
  if (!kept.length) return null;
  let result = kept[0].y;
  for (let k = 0; k < kept.length - 1; k++) {
    if (kept[k].x <= x && x <= kept[k + 1].x) {
      const dx = kept[k + 1].x - kept[k].x;
      result = dx < 1 ? kept[k].y : kept[k].y + (kept[k + 1].y - kept[k].y) * (x - kept[k].x) / dx;
      break;
    }
  }
  return result;
}
function validate(t) {
  if (!t) return { keep: 0, dropped: 0, dropSet: new Set(), kept: [], msgs: [] };
  const pc = t.points.length;
  const msgs = [];
  // engine begins at the min-x point, then keeps strictly increasing x
  let minIdx = 0, minX = pc ? t.points[0].x : 0;
  for (let i = 1; i < pc; i++) if (t.points[i].x < minX) { minX = t.points[i].x; minIdx = i; }
  let keep = 0, lastX = 0;
  const dropSet = new Set();
  const kept = [];
  for (let i = minIdx; i < pc; i++) {
    const p = t.points[i];
    if (keep === 0 || lastX < p.x) { keep++; lastX = p.x; kept.push(p); } else dropSet.add(i);
  }
  for (let i = 0; i < minIdx; i++) dropSet.add(i);   // points before minIdx are skipped by the engine
  if (pc < 2) msgs.push({ t: "err", s: "needs at least 2 points" });
  if (dropSet.size > 0) msgs.push({ t: "warn", s: dropSet.size + " point(s) will be dropped (x not strictly increasing)" });
  if (keep >= 2) msgs.push({ t: "ok", s: keep + " usable points" });
  // Spawn safety: Y is up, so the start must sit ON or ABOVE the surface — a start
  // below the surface makes the bike spawn underground and the physics can crash.
  if (keep >= 2) {
    const surf = surfaceRawAt(kept, t.startX / SCALE);
    if (surf !== null && t.startY / SCALE < surf - 1)
      msgs.push({ t: "err", s: "start is below the surface — bike spawns underground (will likely crash)" });
  }
  if (!t.name.trim()) msgs.push({ t: "warn", s: "empty name" });
  return { keep, dropped: dropSet.size, dropSet, minIdx, kept, msgs };
}

/* =========================================================================
   Canvas view + rendering
   ========================================================================= */
const view = { cx: 0, cy: 0, scale: 1 };   // world point at screen centre + px per world unit
let canvas = null, ctx = null, dpr = 1;
let dragPoint = -1, panning = false, lastMouse = null, toolMode = "add"; // add | pan | setStart | setFinish

function worldBounds(t) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  const acc = (x, y) => { if (x < minX) minX = x; if (y < minY) minY = y; if (x > maxX) maxX = x; if (y > maxY) maxY = y; };
  for (const p of t.points) acc(p.x, p.y);
  acc(t.startX / SCALE, t.startY / SCALE);
  acc(t.finishX / SCALE, t.finishY / SCALE);
  if (!isFinite(minX)) { minX = -100; minY = -100; maxX = 100; maxY = 100; }
  if (maxX - minX < 1) { minX -= 50; maxX += 50; }
  if (maxY - minY < 1) { minY -= 50; maxY += 50; }
  return { minX, minY, maxX, maxY };
}
function fitView() {
  const t = cur(); if (!t) return;
  const b = worldBounds(t);
  const w = canvas.clientWidth, h = canvas.clientHeight;
  view.cx = (b.minX + b.maxX) / 2; view.cy = (b.minY + b.maxY) / 2;
  const sx = (w * 0.88) / (b.maxX - b.minX), sy = (h * 0.82) / (b.maxY - b.minY);
  view.scale = Math.max(0.02, Math.min(sx, sy));
  draw();
}
// The game world is Y-UP (gravity pulls toward -Y; program.vel negates Y when it
// draws). The canvas must match that orientation, else what you draw above the
// track lands *below* the surface in-game (upside-down level + underground spawn
// that crashes the physics). So screen-Y is negated here: larger world Y = higher.
function w2s(wx, wy) {
  return { x: (wx - view.cx) * view.scale + canvas.clientWidth / 2,
           y: (view.cy - wy) * view.scale + canvas.clientHeight / 2 };
}
function s2w(sx, sy) {
  return { x: (sx - canvas.clientWidth / 2) / view.scale + view.cx,
           y: view.cy - (sy - canvas.clientHeight / 2) / view.scale };
}
function resizeCanvas() {
  if (!canvas) return;
  dpr = window.devicePixelRatio || 1;
  canvas.width = Math.round(canvas.clientWidth * dpr);
  canvas.height = Math.round(canvas.clientHeight * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}
function css(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function draw() {
  if (!ctx) return;
  const t = cur();
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0, 0, w, h);
  if (!t) return;
  const colLine = css("--accent"), colPt = css("--text"), colMuted = css("--muted-2");
  const val = validate(t);

  // solid earth: fill everything below the surface (toward -Y / screen bottom), so
  // the Y-up orientation reads at a glance and the start belongs above this fill.
  if (val.kept.length >= 2) {
    ctx.beginPath();
    const s0 = w2s(val.kept[0].x, val.kept[0].y);
    ctx.moveTo(s0.x, h);
    val.kept.forEach((p) => { const s = w2s(p.x, p.y); ctx.lineTo(s.x, s.y); });
    const sN = w2s(val.kept[val.kept.length - 1].x, val.kept[val.kept.length - 1].y);
    ctx.lineTo(sN.x, h);
    ctx.closePath();
    ctx.fillStyle = "rgba(120,132,146,0.16)";
    ctx.fill();
  }

  // baseline at world y = surface? just draw the polyline in list order
  ctx.lineWidth = 2; ctx.strokeStyle = colLine; ctx.beginPath();
  t.points.forEach((p, i) => { const s = w2s(p.x, p.y); i ? ctx.lineTo(s.x, s.y) : ctx.moveTo(s.x, s.y); });
  ctx.stroke();

  // points
  t.points.forEach((p, i) => {
    const s = w2s(p.x, p.y);
    const dropped = val.dropSet && val.dropSet.has(i);
    ctx.beginPath(); ctx.arc(s.x, s.y, i === selPoint ? 5 : 3.2, 0, 7);
    ctx.fillStyle = dropped ? css("--danger") : (i === selPoint ? css("--accent") : colPt);
    ctx.fill();
    if (i === selPoint) { ctx.lineWidth = 1.5; ctx.strokeStyle = css("--accent"); ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.stroke(); }
  });

  // start & finish flags
  drawFlag(t.startX / SCALE, t.startY / SCALE, css("--ok"), "S");
  drawFlag(t.finishX / SCALE, t.finishY / SCALE, css("--danger"), "F");

  // HUD
  $("hud").textContent = "pts " + t.points.length + " · zoom " + view.scale.toFixed(3) +
    " · center " + Math.round(view.cx) + "," + Math.round(view.cy);
}
function drawFlag(wx, wy, color, label) {
  const s = w2s(wx, wy);
  ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(s.x, s.y - 22); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(s.x, s.y - 22); ctx.lineTo(s.x + 14, s.y - 18); ctx.lineTo(s.x, s.y - 14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(s.x, s.y, 3, 0, 7); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "9px " + css("--mono"); ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(label, s.x + 7, s.y - 18);
}

/* ---- canvas interaction ------------------------------------------------ */
function hitPoint(sx, sy) {
  const t = cur(); if (!t) return -1;
  for (let i = t.points.length - 1; i >= 0; i--) {
    const s = w2s(t.points[i].x, t.points[i].y);
    if ((s.x - sx) ** 2 + (s.y - sy) ** 2 <= 49) return i;
  }
  return -1;
}
function insertSortedByX(t, x, y) {
  let i = 0; while (i < t.points.length && t.points[i].x < x) i++;
  t.points.splice(i, 0, { x, y });
  return i;
}
function bindCanvas() {
  canvas.addEventListener("mousedown", (e) => {
    const t = cur(); if (!t) return;
    const r = canvas.getBoundingClientRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    lastMouse = { x: sx, y: sy };
    if (toolMode === "pan" || e.button === 1) { panning = true; return; }
    const w = s2w(sx, sy); const gx = Math.round(w.x), gy = Math.round(w.y);
    if (toolMode === "setStart") { t.startX = gx * SCALE; t.startY = gy * SCALE; setTool("add"); syncForms(); draw(); return; }
    if (toolMode === "setFinish") { t.finishX = gx * SCALE; t.finishY = gy * SCALE; setTool("add"); syncForms(); draw(); return; }
    const hit = hitPoint(sx, sy);
    if (hit >= 0) { selPoint = hit; dragPoint = hit; }
    else { selPoint = insertSortedByX(t, gx, gy); dragPoint = selPoint; renderPointsTable(); }
    draw(); highlightPointRow();
  });
  window.addEventListener("mousemove", (e) => {
    if (dragPoint < 0 && !panning) return;
    const t = cur(); if (!t) return;
    const r = canvas.getBoundingClientRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    if (panning) {
      view.cx -= (sx - lastMouse.x) / view.scale; view.cy -= (sy - lastMouse.y) / view.scale;
      lastMouse = { x: sx, y: sy }; draw(); return;
    }
    const w = s2w(sx, sy);
    t.points[dragPoint] = { x: Math.round(w.x), y: Math.round(w.y) };
    syncPointRow(dragPoint); draw();
  });
  window.addEventListener("mouseup", () => { dragPoint = -1; panning = false; });
  canvas.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const hit = hitPoint(e.clientX - r.left, e.clientY - r.top);
    if (hit >= 0) { deletePoint(hit); }
  });
  canvas.addEventListener("wheel", (e) => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    const before = s2w(sx, sy);
    const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    view.scale = Math.max(0.02, Math.min(50, view.scale * f));
    const after = s2w(sx, sy);
    view.cx += before.x - after.x; view.cy += before.y - after.y;
    draw();
  }, { passive: false });
}
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  if ((e.key === "Delete" || e.key === "Backspace") && selPoint >= 0) { e.preventDefault(); deletePoint(selPoint); }
});

      '<td class="n">' + i + '</td>' +
      '<td><input type="number" data-i="' + i + '" data-k="x" value="' + p.x + '"></td>' +
      '<td><input type="number" data-i="' + i + '" data-k="y" value="' + p.y + '"></td>' +
      '<td class="rm" data-i="' + i + '" title="Delete point">✕</td></tr>';
  });
  html += "</tbody>";
  tbl.innerHTML = html;
  tbl.querySelectorAll("input").forEach((inp) => {
    inp.addEventListener("input", (e) => {
      const i = +e.target.getAttribute("data-i"), k = e.target.getAttribute("data-k");
      const v = parseInt(e.target.value, 10);
      if (!Number.isNaN(v)) { t.points[i][k] = v; draw(); renderStatus(); markDropRows(); }
    });
    inp.addEventListener("focus", (e) => { selPoint = +e.target.getAttribute("data-i"); highlightPointRow(); draw(); });
  });
  tbl.querySelectorAll(".rm").forEach((el) => el.addEventListener("click", (e) => deletePoint(+e.target.getAttribute("data-i"))));
}
function markDropRows() {
  const t = cur(); if (!t) return; const val = validate(t);
  document.querySelectorAll("#ptsTable tbody tr").forEach((tr) => {
    const i = +tr.getAttribute("data-i");
    tr.classList.toggle("drop", val.dropSet && val.dropSet.has(i));
  });
}
function syncPointRow(i) {
  const t = cur(); if (!t) return;
  const xs = document.querySelector('#ptsTable input[data-i="' + i + '"][data-k="x"]');
  const ys = document.querySelector('#ptsTable input[data-i="' + i + '"][data-k="y"]');
  if (xs) xs.value = t.points[i].x; if (ys) ys.value = t.points[i].y;
  markDropRows();
}
function highlightPointRow() {
  document.querySelectorAll("#ptsTable tbody tr").forEach((tr) =>
    tr.classList.toggle("sel", +tr.getAttribute("data-i") === selPoint));
}
function deletePoint(i) {
  const t = cur(); if (!t) return;
  t.points.splice(i, 1);
  if (selPoint === i) selPoint = -1; else if (selPoint > i) selPoint--;
  renderPointsTable(); draw(); renderStatus();
}

/* ---- status bar -------------------------------------------------------- */
function setStatus(s) { $("statusMain").innerHTML = s; }
function renderStatus() {
  const t = cur();
  if (!t) { setStatus(project.length ? "Select a track." : "Ready. Import a .mrg / tracks.vel, or create a new track."); return; }
  const val = validate(t);

/* =========================================================================
   Import / export wiring
   ========================================================================= */
let pendingImport = [];   // tracks awaiting the picker decision

function openPicker(title, tracks, note) {
  pendingImport = tracks;
  $("modalTitle").textContent = title;
  $("pickInfo").textContent = note || "";
  const ul = $("pickList"); ul.innerHTML = "";
  tracks.forEach((t, i) => {
    const li = document.createElement("li"); li.className = "pick-item";
    li.innerHTML = '<input type="checkbox" checked data-i="' + i + '">' +
      '<span class="badge l' + t.league + '">' + LEAGUE_NAMES[t.league] + '</span>' +
      '<span class="pn"></span><span class="pm">' + t.points.length + ' pts</span>';
    li.querySelector(".pn").textContent = t.name;
    ul.appendChild(li);
  });
  updatePickCount();
  ul.querySelectorAll("input").forEach((c) => c.addEventListener("change", updatePickCount));
  $("modal").classList.add("show");
}
function updatePickCount() {
  const n = document.querySelectorAll("#pickList input:checked").length;
  $("pickCount").textContent = n + " of " + pendingImport.length + " selected";
}
function selectedImport() {
  const out = [];
  document.querySelectorAll("#pickList input").forEach((c) => { if (c.checked) out.push(pendingImport[+c.getAttribute("data-i")]); });
  return out;
}
function closePicker() { $("modal").classList.remove("show"); pendingImport = []; }

function wireUI() {
  $("btnImportMrg").addEventListener("click", () => $("fileMrg").click());
  $("btnImportVel").addEventListener("click", () => $("fileVel").click());
  $("fileMrg").addEventListener("change", (e) => {
    const f = e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const res = parseMrg(rd.result);
        openPicker("Import from " + f.name, res.tracks, "parsed " + res.count + " tracks · " + res.mode + " mode");
        setStatus('<span class="ok">Parsed ' + res.count + " tracks from " + f.name + " (" + res.mode + " mode).</span>");
      } catch (err) { setStatus('<span class="err">.mrg parse failed: ' + err.message + "</span>"); alert("Could not parse .mrg:\n" + err.message); }
    };
    rd.readAsArrayBuffer(f); e.target.value = "";
  });
  $("fileVel").addEventListener("change", (e) => {
    const f = e.target.files[0]; if (!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const tracks = parseTracksVel(rd.result);
        if (!tracks.length) throw new Error("no trackData entries found");
        openPicker("Import from " + f.name, tracks, "parsed " + tracks.length + " tracks");
      } catch (err) { setStatus('<span class="err">tracks.vel parse failed: ' + err.message + "</span>"); alert("Could not parse tracks.vel:\n" + err.message); }
    };
    rd.readAsText(f); e.target.value = "";
  });
  $("pickAll").addEventListener("click", () => { document.querySelectorAll("#pickList input").forEach((c) => c.checked = true); updatePickCount(); });
  $("pickNone").addEventListener("click", () => { document.querySelectorAll("#pickList input").forEach((c) => c.checked = false); updatePickCount(); });
  $("pickCancel").addEventListener("click", closePicker);
  $("modalX").addEventListener("click", closePicker);
  $("pickAdd").addEventListener("click", () => { const s = selectedImport(); project = project.concat(s.map(clone)); afterImport(); });
  $("pickReplace").addEventListener("click", () => { const s = selectedImport(); project = s.map(clone); sel = -1; afterImport(); });
  $("btnNew").addEventListener("click", () => { project.push(newTrack("Track " + project.length)); sel = project.length - 1; selPoint = -1; render(); renderEditor(); requestAnimationFrame(fitView); });
  $("btnClearAll").addEventListener("click", () => { if (project.length && confirm("Remove all " + project.length + " tracks from the project?")) { project = []; sel = -1; render(); } });
  $("btnExport").addEventListener("click", exportVel);
  // Play overlay controls
  $("playExit").addEventListener("click", () => window.__gdPlay.stop());
  $("playRestart").addEventListener("click", () => window.__gdPlay.restart());
  $("playLeague").addEventListener("change", (e) => window.__gdPlay.setLeague(+e.target.value));
  document.querySelectorAll(".play-touch button").forEach((b) => {
    const btn = b.getAttribute("data-btn");
    b.addEventListener("pointerdown", (e) => { e.preventDefault(); window.__gdPlay.press(btn, true); });
    b.addEventListener("pointerup", (e) => { e.preventDefault(); window.__gdPlay.press(btn, false); });
    b.addEventListener("pointerleave", () => window.__gdPlay.press(btn, false));
  });
  window.addEventListener("resize", () => { if (canvas) resizeCanvas(); });
}
function clone(t) { return JSON.parse(JSON.stringify(t)); }
function afterImport() {
  closePicker();
  if (sel < 0 && project.length) sel = 0;
  render(); renderEditor(); if (cur()) requestAnimationFrame(fitView);
  setStatus('<span class="ok">Project now has ' + project.length + " tracks.</span>");
}
function exportVel() {
  if (!project.length && !confirm("Export an empty tracks.vel?")) return;
  const text = generateTracksVel(project);
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "tracks.vel";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  setStatus('<span class="ok">Exported tracks.vel · ' + project.length + " tracks · " + text.length + " bytes.</span>");
}

/* ===== Gravity Defied engine (physics + render), 1:1 port of engine.vel + program.vel ===== */
// Gravity Defied physics — 1:1 port of engine.vel (Track physics + Physics).
// Velo `int` is 32-bit, so JS <<,>>,|0 match exactly; the 16.16 products that need
// a 64-bit intermediate (fm/fdiv/build) use BigInt, then truncate to 32-bit.
const GDSim = (function () {
  "use strict";
  const ONE = 65536, HALF_PI = 0x19220, PI = 0x3243f, TWO_PI = 0x6487f, QUARTER = 0x19220;

  function iabs(v) { return v < 0 ? (0 - v) | 0 : v; }
  // (int)((long)a * (long)b >> 16)
  function fm(a, b) { return Number(BigInt.asIntN(32, (BigInt(a | 0) * BigInt(b | 0)) >> 16n)); }
  // (int)(((long)a << 32) / (long)b >> 16)
  function fdiv(a, b) { return Number(BigInt.asIntN(32, ((BigInt(a | 0) << 32n) / BigInt(b | 0)) >> 16n)); }
  // |(j,i1)| approximation (no sqrt)
  function hyp(j, i1) {
    let aj = iabs(j), ai = iabs(i1), l1 = aj, i2 = ai;
    if (ai >= aj) { l1 = ai; i2 = aj; }
    return (fm(64448, l1) + fm(28224, i2)) | 0;
  }

  const SINQ = [
    0, 1608, 3215, 4821, 6423, 8022, 9616, 11204, 12785, 14359,
    15923, 17479, 19024, 20557, 22078, 23586, 25079, 26557, 28020, 29465,
    30893, 32302, 33692, 35061, 36409, 37736, 39039, 40319, 41575, 42806,
    44011, 45189, 46340, 47464, 48558, 49624, 50660, 51665, 52639, 53581,
    54491, 55368, 56212, 57022, 57797, 58538, 59243, 59913, 60547, 61144,
    61705, 62228, 62714, 63162, 63571, 63943, 64276, 64571, 64826, 65043,
    65220, 65358, 65457, 65516, 65536
  ];
  function sinQ(a) {
    const idx = fdiv(a, QUARTER);
    let p = fm(idx, 64 * ONE) >> 16;
    if (p < 0) p = 0;
    if (p >= 64) return SINQ[64];
    const frac = (fm(idx, 64 * ONE) - (p << 16)) | 0;
    const lo = SINQ[p], hi = SINQ[p + 1];
    return (lo + fm(hi - lo, frac)) | 0;
  }
  function fsin(a) {
    a = a % TWO_PI;
    if (a < 0) a = (a + TWO_PI) | 0;
    if (a <= QUARTER) return sinQ(a);
    if (a <= PI) return sinQ((PI - a) | 0);
    if (a <= PI + QUARTER) return (0 - sinQ((a - PI) | 0)) | 0;
    return (0 - sinQ((TWO_PI - a) | 0)) | 0;
  }
  function fcos(a) { return fsin((a + HALF_PI) | 0); }

  const FORA = [0x1c000, 0x10000, 32768];

  function newVec() { return { x: 0, y: 0, e: 0, d: 0, fx: 0, fy: 0, wv: 0, wa: 0, wang: 0 }; }
  function resetVec(v) { v.x = 0; v.y = 0; v.e = 0; v.d = 0; v.fx = 0; v.fy = 0; v.wv = 0; v.wa = 0; v.wang = 0; }
  function newNode() { const s = []; for (let i = 0; i < 6; i++) s.push(newVec()); return { rad: 0, radIdx: 0, invm: 0, torque: 0, s }; }
  function resetNode(n) { n.rad = 0; n.invm = 0; n.torque = 0; for (let i = 0; i < 6; i++) resetVec(n.s[i]); }

  // ---- Track physics (engine.vel Track class) ------------------------------
  class TrackPhys {
    constructor() {
      this.startX = 0; this.startY = 0; this.finishX = 0xc80000; this.finishY = 0;
      this.gotoIdx = 0; this.finIdx = 0; this.count = 0;
      this.px = []; this.py = []; this.nx = []; this.ny = [];
      this.ea = 0; this.fa = 0; this.winA = 0; this.winK = 0;
      this.haI = [0, 0, 0]; this.vaI = [0, 0, 0];
      this.eOut = 0; this.dOut = 0;
      this.perspective = false;
      this.cullE = 0; this.cullB = 0; this.cullG = 0;
    }
    init() {
      for (let j = 0; j < 3; j++) {
        const a = (FORA[j] + 19660) >> 1;
        const b = (FORA[j] - 19660) >> 1;
        this.haI[j] = fm(a, a);
        this.vaI[j] = fm(b, b);
      }
    }
    buildNormals() {
      this.nx = new Array(this.count); this.ny = new Array(this.count);
      for (let k = 0; k < this.count; k++) {
        const i1 = (this.px[(k + 1) % this.count] - this.px[k]) | 0;
        const j1 = (this.py[(k + 1) % this.count] - this.py[k]) | 0;
        const k1 = (0 - j1) | 0;
        const i2 = i1;
        const j2 = hyp(k1, i2);
        this.nx[k] = fdiv(k1, j2);
        this.ny[k] = fdiv(i2, j2);
        if (this.gotoIdx === 0 && this.px[k] > this.startX) this.gotoIdx = k + 1;
        if (this.finIdx === 0 && this.px[k] > this.finishX) this.finIdx = k;
      }
    }
    // rawPoints: [{x,y}] raw units; start/finish already in scaled (tracks.vel) units.
    load(rawPoints, startX, startY, finishX, finishY) {
      this.startX = startX | 0; this.startY = startY | 0;
      this.finishX = finishX | 0; this.finishY = finishY | 0;
      const pc = rawPoints.length;
      this.gotoIdx = 0; this.finIdx = 0;
      this.px = []; this.py = []; this.count = 0;
      let minIdx = 0, minX = rawPoints[0].x;
      for (let s = 1; s < pc; s++) if (rawPoints[s].x < minX) { minX = rawPoints[s].x; minIdx = s; }
      for (let i = minIdx; i < pc; i++) {
        const rx = rawPoints[i].x | 0, ry = rawPoints[i].y | 0;
        const sx = (rx << 16) >> 3;
        const sy = (ry << 16) >> 3;
        if (this.count === 0 || this.px[this.count - 1] < sx) {
          this.px[this.count] = sx; this.py[this.count] = sy; this.count++;
        }
      }
      this.buildNormals();
      if (this.finIdx <= 0) this.finIdx = this.count - 1;
      this.ea = 0; this.fa = 0; this.winA = 0; this.winK = 0;
    }
    spawnX() { return this.startX << 1; }
    surfaceAtPoint(x) {
      let result = this.py[0];
      for (let k = 0; k < this.count - 1; k++) {
        if (this.px[k] <= x && x <= this.px[k + 1]) {
          const dx = (this.px[k + 1] - this.px[k]) | 0;
          if (dx < 1) result = this.py[k];
          else result = (this.py[k] + Math.trunc((this.py[k + 1] - this.py[k]) * (x - this.px[k]) / dx)) | 0;
          break;
        }
      }
      return result;
    }
    spawnY() {
      if (this.count < 2) return this.startY << 1;
      const surf = this.surfaceAtPoint(this.startX);
      let y = this.startY;
      const MAXDROP = 0x30000;
      if (y - surf > MAXDROP) y = (surf + MAXDROP) | 0;
      return y << 1;
    }
    startPointX() { return this.px[this.gotoIdx] << 1; }
    finishPointX() { return this.px[this.finIdx] << 1; }
    progressAt(j) {
      const x = j >> 1;
      const k = (x - this.px[this.gotoIdx]) | 0;
      const i1 = (this.px[this.finIdx] - this.px[this.gotoIdx]) | 0;
      if (iabs(i1) < 3 || k > i1) return ONE;
      return fdiv(k, i1);
    }
    window(jIn, kIn) {
      const j = jIn >> 1;
      const k = kIn >> 1;
      if (this.fa >= this.count - 1) this.fa = this.count - 1;
      if (this.ea < 0) this.ea = 0;
      if (k > this.winK) {
        let go = true;
        while (this.fa < this.count - 1 && go) {
          this.fa = this.fa + 1;
          if (k > this.px[this.fa]) {} else go = false;
        }
      } else {
        if (j < this.winA) {
          let go2 = true;
          while (this.ea > 0 && go2) {
            this.ea = this.ea - 1;
            if (j < this.px[this.ea]) {} else go2 = false;
          }
        } else {
          let go3 = true;
          while (this.ea < this.count - 1 && go3) {
            this.ea = this.ea + 1;
            if (j > this.px[this.ea]) {} else go3 = false;
          }
          if (this.ea > 0) this.ea = this.ea - 1;
          let go4 = true;
          while (this.fa > 0 && go4) {
            this.fa = this.fa - 1;
            if (k < this.px[this.fa]) {} else go4 = false;
          }
          if (this.fa + 1 >= this.count - 1) this.fa = this.count - 1; else this.fa = this.fa + 1;
        }
      }
      this.winA = this.px[this.ea];
      this.winK = this.px[this.fa];
    }
    collide(n1, radIdx) {
      let k3 = 0, byte1 = 2;
      const l3 = n1.x >> 1;
      let i4 = n1.y >> 1;
      if (this.perspective) i4 = (i4 - ONE) | 0;
      let j4 = 0, k4 = 0, l4 = this.ea, result = -1;
      while (l4 < this.fa && result < 0) {
        const k = this.px[l4], i1 = this.py[l4];
        const j1 = this.px[l4 + 1], k1 = this.py[l4 + 1];
        if (l3 - this.haI[radIdx] > j1 || l3 + this.haI[radIdx] < k) {
          // out of reach
        } else {
          let l1 = (k - j1) | 0;
          let i2 = (i1 - k1) | 0;
          const j2 = (fm(l1, l1) + fm(i2, i2)) | 0;
          const k2 = (fm(l3 - k, 0 - l1) + fm(i4 - i1, 0 - i2)) | 0;
          let l2 = 0;
          if (iabs(j2) >= 3) l2 = fdiv(k2, j2);
          else {
            const sgnK = k2 <= 0 ? -1 : 1;
            const sgnJ = j2 <= 0 ? -1 : 1;
            l2 = (sgnK * sgnJ * 0x7fffffff) | 0;
          }
          if (l2 < 0) l2 = 0;
          if (l2 > ONE) l2 = ONE;
          const i3 = (k + fm(l2, 0 - l1)) | 0;
          const j3 = (i1 + fm(l2, 0 - i2)) | 0;
          l1 = (l3 - i3) | 0;
          i2 = (i4 - j3) | 0;
          const l5 = (fm(l1, l1) + fm(i2, i2)) | 0;
          let byte0 = 2;
          if (l5 < this.haI[radIdx]) { if (l5 >= this.vaI[radIdx]) byte0 = 1; else byte0 = 0; }
          const dot = (fm(this.nx[l4], n1.e) + fm(this.ny[l4], n1.d)) | 0;
          if (byte0 === 0 && dot < 0) { this.eOut = this.nx[l4]; this.dOut = this.ny[l4]; result = 0; }
          else if (byte0 === 1 && dot < 0) {
            k3 = k3 + 1; byte1 = 1;
            if (k3 === 1) { j4 = this.nx[l4]; k4 = this.ny[l4]; }
            else { j4 = (j4 + this.nx[l4]) | 0; k4 = (k4 + this.ny[l4]) | 0; }
          }
        }
        l4 = l4 + 1;
      }
      if (result >= 0) return result;
      if (byte1 === 1) {
        if (fm(j4, n1.e) + fm(k4, n1.d) >= 0) return 2;
        this.eOut = j4; this.dOut = k4;
      }
      return byte1;
    }
    setCull3(e, b, g) { this.cullE = e; this.cullB = b; this.cullG = g; }
    setCull2(j, k) { this.cullE = j >> 1; this.cullB = k >> 1; }
    advanceWindow(j, k, i1) {
      this.setCull3((j + 0x18000) >> 1, (k - 0x18000) >> 1, i1 >> 1);
      this.window(j, k);
    }
  }

  // ---- Physics (engine.vel Physics class) ----------------------------------
  class Physics {
    constructor(lf) {
      this.lf = lf;
      this.hak = []; this.ian = []; this.aaan = [];
      this.vaI = 0; this.waI = 1; this.xaI = -1; this.cI = 0; this.EI = 0; this.CI = 0;
      this.IZ = false; this.mZ = false; this.TI = 32768; this.kI = 0;
      this.vZ = false; this.bZ = false; this.afZ = false; this.tI = 0; this.zI = 0;
      this.elseZ = false; this.UZ = false; this.ifZ = false; this.sZ = false; this.rZ = false; this.OZ = false;
      this.dZ = false; this.FZ = false; this.XZ = false; this.wZ = false; this.RZ = false; this.NZ = false;
      this.doZ = true; this.oI = 0; this.nI = 0; this.GI = 0xa0000;
      this.hI = 0; this.YI = 1310; this.voidI = 0x190000;
      this.gI = 45875; this.fI = 13107; this.eI = 39321; this.yI = 0x140000; this.xI = 0x40000; this.jI = 6553;
      this.aeI = 32768; this.adI = 32768; this.maxSpin = 0x110000; this.QI = 0x3e80000; this.charI = 0x320000;
      this.abI = 6553; this.WI = 26214; this.AI = 26214; this.longI = 0x50000; this.qI = 0x12c0000;
    }
    akk(k1, n1, k2, j, i1) {
      const n2 = k1.s[j], n3 = k2.s[j];
      let j1 = (n2.x - n3.x) | 0, l1 = (n2.y - n3.y) | 0;
      const i2 = hyp(j1, l1);
      if (iabs(i2) >= 3) {
        j1 = fdiv(j1, i2); l1 = fdiv(l1, i2);
        const j2 = (i2 - n1.y) | 0;
        const stiff = fm(j2, n1.x);
        let l2 = fm(j1, stiff);
        let i3 = fm(l1, stiff);
        const j3 = (n2.e - n3.e) | 0, k3 = (n2.d - n3.d) | 0;
        const l3 = fm((fm(j1, j3) + fm(l1, k3)) | 0, n1.wang);
        l2 = (l2 + fm(j1, l3)) | 0;
        i3 = (i3 + fm(l1, l3)) | 0;
        l2 = fm(l2, i1); i3 = fm(i3, i1);
        n2.fx = (n2.fx - l2) | 0; n2.fy = (n2.fy - i3) | 0;
        n3.fx = (n3.fx + l2) | 0; n3.fy = (n3.fy + i3) | 0;
      }
    }
    deriv(j, i1, j1) {
      for (let l1 = 0; l1 < 6; l1++) {
        const n1 = this.hak[l1].s[j], n2 = this.hak[l1].s[i1];
        n2.x = fm(n1.e, j1); n2.y = fm(n1.d, j1);
        const k1 = fm(j1, this.hak[l1].invm);
        n2.e = fm(n1.fx, k1); n2.d = fm(n1.fy, k1);
      }
    }
    combine(j, i1, j1) {
      for (let k1 = 0; k1 < 6; k1++) {
        const n1 = this.hak[k1].s[j], n2 = this.hak[k1].s[i1], n3 = this.hak[k1].s[j1];
        n1.x = (n2.x + (n3.x >> 1)) | 0; n1.y = (n2.y + (n3.y >> 1)) | 0;
        n1.e = (n2.e + (n3.e >> 1)) | 0; n1.d = (n2.d + (n3.d >> 1)) | 0;
      }

  }

  function drawFrame(fdx, fdy, pdx, pdy) {
    const a = phys.aaan;
    const rwx = a[2].x, rwy = a[2].y;
    const k2 = (rwx + fm(pdx, 32768)) | 0, l2 = (rwy + fm(pdy, 32768)) | 0;
    const i3 = (rwx - fm(pdx, 32768)) | 0, j3 = (rwy - fm(pdy, 32768)) | 0;
    const k3 = (a[0].x + fm(fdx, 32768)) | 0, l3 = (a[0].y + fm(fdy, 32768)) | 0;
    const i4 = (k3 - fm(fdx, 0x20000)) | 0, j4 = (l3 - fm(fdy, 0x20000)) | 0;
