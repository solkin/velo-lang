# =============================================================================
# velo-bytecode.yaml — Single Source of Truth for the Velo `.vbc` format & ISA.
#
# This file is the AUTHORITATIVE, language-neutral description of the bytecode
# container and the instruction set. Every implementation (Kotlin `velo-core`,
# a future Go/C/TS compiler or VM) should be GENERATED from this file — the
# opcode table, type tags, and container layout must never be hand-copied per
# stack, or they drift.
#
# Scope: this pins the *format* (how bytes are laid out). The *semantics* of
# each op (overflow, evaluation order, error behaviour) are pinned separately by
# the conformance corpus + the reference implementation (velo-vm2); see the
# `semantics` note on each op and `spec/README`.
#
# Generators emit: (a) codecs `read/write` per stack, (b) an opcode enum/table,
# (c) the human `.vbc` spec doc. Keep this in lockstep with the round-trip test.
# =============================================================================

format:
  name: velo-bytecode
  extension: .vbc
  magic: 0x5e10                 # u16 BE — the first two bytes of every file
  version:
    major: 12                   # u8 — reader MUST reject a file whose major differs
    minor: 0                    # u8 — informational; a reader accepts any minor
  endianness: big               # all multi-byte scalars are big-endian
  rules:
    - "Reject the stream if the leading u16 != magic."
    - "Reject the stream if versionMajor != the reader's supported major."
    - "Opcodes are NEVER renumbered. Gaps in the numbering are retired opcodes."
    - "Type tag 0x09 is permanently retired (was `dict`, removed in v10)."
    - "v12 retired the per-pair conversion opcodes (0x15-0x17, 0x1f, 0x40, 0x49, 0x4a-0x4e)
       and 0x2c, collapsing number<->string/number conversion into four symmetric ops:
       NumConv 0x63 (num->num), NumStr 0x64 (num->str), StrNum 0x65 (str->num), plus the
       existing IntChar (codepoint->char). All four are host-backed representation casts."

# -----------------------------------------------------------------------------
# Primitive wire encodings. These mirror java.io.DataOutput but are defined here
# in stack-neutral terms so non-JVM implementations reproduce them exactly.
# -----------------------------------------------------------------------------
primitives:
  u8:   { bytes: 1, desc: "unsigned byte" }
  u16:  { bytes: 2, endian: big, desc: "unsigned short (also used for signed frame refs 0..65535)" }
  i32:  { bytes: 4, endian: big, desc: "signed two's-complement 32-bit int" }
  i64:  { bytes: 8, endian: big, desc: "signed two's-complement 64-bit long" }
  f32:  { bytes: 4, endian: big, desc: "IEEE-754 single precision" }
  bool: { bytes: 1, desc: "0x00 = false, 0x01 = true" }
  utf:
    desc: >
      Java "Modified UTF-8": a u16 unsigned byte-length prefix followed by the
      payload. Modified UTF-8 encodes U+0000 as the two bytes C0 80 and
      supplementary code points as two 3-byte surrogate halves. ASCII is
      identical to standard UTF-8. Non-JVM implementations MUST replicate the
      modified form for byte-exact `.vbc` output.

# A `list<CNT, T>` is a count encoded as primitive `CNT`, then that many `T`.

# -----------------------------------------------------------------------------
# Type tags — one byte, shared by inline `Push` literals and serialized VmTypes.
# -----------------------------------------------------------------------------
type_tags:
  void:     0x00
  any:      0x01
  byte:     0x02
  int:      0x03
  float:    0x04
  str:      0x05
  bool:     0x06
  tuple:    0x07
  array:    0x08
  # 0x09 — RETIRED (was dict)
  class:    0x0a
  func:     0x0b
  ptr:      0x0c
  null_ptr: 0x0d
  long:     0x0e

# How a VmType serializes: its 1-byte tag, then the payload below (empty = tag
# only). Used in the native pool, data-class fields, and `NativeCall` operands.
vmtype:
  void:  {}
  any:   {}
  byte:  {}
  int:   {}
  long:  {}
  float: {}
  str:   {}
  bool:  {}
  tuple: { payload: [ { name: elements, enc: "list<u8, vmtype>" } ] }
  array: { payload: [ { name: element, enc: vmtype } ] }
  class: { payload: [ { name: name, enc: utf } ] }
  func:
    payload:
      - { name: hasArgs,  enc: bool }
      - { name: argCount, enc: u8,             when: hasArgs }
      - { name: args,     enc: "vmtype[argCount]", when: hasArgs }
      - { name: hasRet,   enc: bool }
      - { name: ret,      enc: vmtype,         when: hasRet }
  ptr:   { payload: [ { name: derived, enc: vmtype } ] }

# How a `Push` literal serializes: its type tag, then the payload below. Only
# this subset of tags is legal as a literal (null_ptr is tag-only).
literal:
  byte:     { enc: u8 }
  int:      { enc: i32 }
  long:     { enc: i64 }
  float:    { enc: f32 }
  str:      { enc: utf }
  bool:     { enc: bool }
  null_ptr: {}

# -----------------------------------------------------------------------------
# Container layout — the exact top-level field order of a `.vbc` stream.
# -----------------------------------------------------------------------------
container:
  - { name: magic,        enc: u16, const: 0x5e10 }
  - { name: versionMajor, enc: u8,  const: 11 }
  - { name: versionMinor, enc: u8,  const: 3 }
  - { name: natives,      enc: "list<u16, NativeRef>",       desc: "native pool: every host entry point the code references" }
  - { name: dataClasses,  enc: "list<u16, DataClassInfo>",   desc: "marshalling metadata for value types" }
  - { name: classMethods, enc: "list<u16, ClassMethodsInfo>", desc: "per-class method tables for interface dispatch" }
  - { name: frames,       enc: "list<u16, Frame>",           desc: "the compiled code" }

structs:
  NativeRef:
    doc: "One native entry point (constructor or method) resolved against the host registry at load."
    fields:
      - { name: kind,       enc: u8,  desc: "0 = constructor, 1 = method" }
      - { name: className,  enc: utf }
      - { name: methodName, enc: utf, desc: "empty for a constructor" }
      - { name: params,     enc: "list<u8, vmtype>" }
      - { name: returns,    enc: vmtype }
  DataClassInfo:
    doc: "A `data class`, keyed by its frame; fields let the runtime copy it across boundaries by re-running the constructor."
    fields:
      - { name: frameNum, enc: i32 }
      - { name: name,     enc: utf }
      - { name: fields,   enc: "list<u8, DataField>" }
  DataField:
    fields:
      - { name: name,  enc: utf }
      - { name: index, enc: i32, desc: "the instance-scope variable slot holding this field" }
      - { name: type,  enc: vmtype }
  ClassMethodsInfo:
    doc: "The method table for one class frame — method name -> instance-scope slot, for Op.MethodLoad dispatch."
    fields:
      - { name: frameNum, enc: i32 }
      - { name: methods,  enc: "list<u16, ClassMethod>" }
  ClassMethod:
    fields:
      - { name: name,  enc: utf }
      - { name: index, enc: i32 }
  Frame:
    doc: "One compiled frame: its number (referenced by Op.Frame/Op.Call), the variable slots it declares, and its ops."
    fields:
      - { name: num,  enc: u16 }
      - { name: vars, enc: "list<u16, u16>", desc: "declared variable slot indices" }
      - { name: ops,  enc: "list<u16, Op>" }
  Op:
    doc: "opcode byte, then the operands defined per-op in `opcodes` below."
    fields:
      - { name: opcode,   enc: u8 }
      - { name: operands, enc: "see opcodes[].operands" }

# -----------------------------------------------------------------------------
# The instruction set (52 ops). `stack` is `before -> after`, top of stack on
# the right. `operands` is the byte layout that follows the opcode byte.
# -----------------------------------------------------------------------------
opcodes:

  # ---- Stack manipulation ----
  - { name: Push, code: 0x29, category: stack, operands: [ { name: value, enc: literal } ], stack: "[] -> [value]", doc: "Push an inline literal." }
  - { name: Pop,  code: 0x0c, category: stack, stack: "[a] -> []",        doc: "Drop the top value." }
  - { name: Dup,  code: 0x0d, category: stack, stack: "[a] -> [a, a]",    doc: "Duplicate the top value." }
  - { name: Swap, code: 0x34, category: stack, stack: "[a, b] -> [b, a]", doc: "Swap the two top values." }

  # ---- Arithmetic (numeric; byte/int/long/float promote to the wider type) ----
  - { name: Add, code: 0x26, category: arithmetic, stack: "[a, b] -> [a + b]" }
  - { name: Sub, code: 0x1a, category: arithmetic, stack: "[a, b] -> [a - b]" }
  - { name: Mul, code: 0x1e, category: arithmetic, stack: "[a, b] -> [a * b]" }
  - { name: Div, code: 0x0b, category: arithmetic, stack: "[a, b] -> [a / b]" }
  - { name: Rem, code: 0x2a, category: arithmetic, stack: "[a, b] -> [a % b]", doc: "Remainder." }

  # ---- Bitwise (int/long operands) ----
  - { name: And, code: 0x02, category: bitwise, stack: "[a, b] -> [a & b]" }
  - { name: Or,  code: 0x21, category: bitwise, stack: "[a, b] -> [a | b]" }
  - { name: Xor, code: 0x35, category: bitwise, stack: "[a, b] -> [a ^ b]" }
  - { name: Shl, code: 0x46, category: bitwise, stack: "[value, bits] -> [value << bits]" }
  - { name: Shr, code: 0x47, category: bitwise, stack: "[value, bits] -> [value >> bits]" }

  # ---- Comparison ----
  - { name: More,   code: 0x1b, category: comparison, stack: "[a, b] -> [a > b]", doc: "Numeric greater-than." }
  - { name: Equals, code: 0x0e, category: comparison, stack: "[a, b] -> [a == b]", doc: "Structural equality of any two values." }

  # ---- Conversions / hashing ----
  - { name: IntChar,    code: 0x14, category: convert, stack: "[int] -> [str]",   doc: "Unicode code point to a 1-char string." }
  - { name: NumConv, code: 0x63, category: convert, operands: [ { name: to, enc: vmtype } ], stack: "[num] -> [num']", doc: "Number->number conversion to kind `to` (a scalar byte/int/long/float type tag). The source kind is read polymorphically from the value: widening is exact, narrowing to int/long truncates toward zero, narrowing to byte takes the low 8 bits." }
  - { name: NumStr, code: 0x64, category: convert, stack: "[num] -> [str]", doc: "Number->string: decimal string of a numeric value, polymorphic over its runtime kind (byte/int/long plain, float with a fraction). Host-backed (shortest round-trip float format)." }
  - { name: StrNum, code: 0x65, category: convert, operands: [ { name: to, enc: vmtype } ], stack: "[str] -> [num]", doc: "String->number: parse a decimal string into kind `to` (int/long/float), trimming surrounding whitespace. Host-backed; an invalid string errors." }
  - { name: Hash,       code: 0x48, category: convert, stack: "[a] -> [hash(a)]" }

  # ---- Strings ----
  - { name: StrCon,   code: 0x2e, category: string, stack: "[a, b] -> [a + b]",           doc: "Concatenation." }
  - { name: StrLen,   code: 0x30, category: string, stack: "[str] -> [length]" }
  - { name: StrIndex, code: 0x2f, category: string, stack: "[str, index] -> [int]",       doc: "Code point at index." }
  - { name: StrSub,   code: 0x33, category: string, stack: "[str, end, start] -> [result]", doc: "Substring." }

  # ---- Arrays ----
  - { name: ArrNew,   code: 0x03, category: array, stack: "[size] -> [array]",   doc: "Allocate `size` empty cells (not zero-initialised)." }
  - { name: ArrLen,   code: 0x05, category: array, stack: "[array] -> [length]" }
  - { name: ArrLoad,  code: 0x04, category: array, stack: "[array, index, count] -> [e_index ... e_index+count-1]", doc: "Load `count` consecutive elements." }
  - { name: ArrStore, code: 0x08, category: array, stack: "[v_1 ... v_count, array, index, count] -> [array]", doc: "Store `count` values in place; push the array back." }
  - { name: ArrCopy,  code: 0x32, category: array, stack: "[dst, src, length, dstPos, srcPos] -> []", doc: "System.arraycopy equivalent." }

  # ---- Variables ----
  - { name: Load,  code: 0x0f, category: variable, operands: [ { name: index, enc: i32 } ], stack: "[] -> [value]", doc: "Load local variable [index]." }
  - { name: Store, code: 0x2d, category: variable, operands: [ { name: index, enc: i32 } ], stack: "[value] -> []", doc: "Store into local variable [index]." }

  # ---- Control flow ----
  - { name: If,        code: 0x12, category: control, operands: [ { name: elseSkip, enc: i32 } ], stack: "[bool] -> []", doc: "On false, skip `elseSkip` following ops." }
  - { name: Move,      code: 0x1d, category: control, operands: [ { name: count, enc: i32 } ],    stack: "[] -> []",     doc: "Unconditional skip of `count` following ops." }
  - { name: ScopeEnter,code: 0x22, category: control, operands: [ { name: base, enc: i32 }, { name: count, enc: i32 } ], stack: "[] -> []", doc: "Enter a fresh per-iteration loop scope of `count` slots at `base` (env change only, no call frame)." }
  - { name: ScopeLeave,code: 0x23, category: control, stack: "[] -> []", doc: "Leave the innermost ScopeEnter scope." }
  - { name: Halt,      code: 0x11, category: control, stack: "[] -> []", doc: "Stop the whole program." }
  - { name: Ret,       code: 0x2b, category: control, stack: "[.. value?] -> []", doc: "Return; if the frame's stack is non-empty, its top is pushed to the caller." }
  - { name: Frame,     code: 0x18, category: control, operands: [ { name: num, enc: i32 } ], stack: "[] -> [func]", doc: "Push a function value for frame [num], capturing the current variable chain (lexical scoping)." }
  - { name: Instance,  code: 0x42, category: control, stack: "[] -> [instance]", doc: "Materialise the executing class frame as an instance (what `new X(...)` leaves behind)." }
  - { name: MethodLoad,code: 0x19, category: control, operands: [ { name: name, enc: utf } ], stack: "[] -> [func]", doc: "Resolve method [name] on the receiver (this frame's lexical parent); dynamic half of interface dispatch." }
  - { name: InterfaceCall, code: 0x1c, category: control, operands: [ { name: method, enc: utf }, { name: args, enc: i32 } ], stack: "[receiver, arg_args ... arg_1, wrapper] -> [result?]", doc: "Invoke [method] on an interface-typed receiver, dispatching on its runtime kind (Velo instance or native handle)." }
  - { name: Call,      code: 0x09, category: control, operands: [ { name: args, enc: i32 }, { name: classParent, enc: bool }, { name: callbackResult, enc: bool } ], stack: "[receiver?, arg_args ... arg_1, callable] -> [result?]", doc: "Invoke a callable. abs(args) is the arity; args < 0 reverses the argument slice used by a class/interface method wrapper before entering the resolved method. classParent: use the receiver's scope as parent. callbackResult: a value-returning cross-actor callback blocks for the reply." }

  # ---- Pointers ----
  - { name: PtrNew,      code: 0x50, category: pointer, stack: "[value] -> [ptr]", doc: "Box the top value into a fresh pointer." }
  - { name: PtrLoad,     code: 0x51, category: pointer, stack: "[ptr] -> [value]", doc: "Dereference." }
  - { name: PtrStore,    code: 0x52, category: pointer, stack: "[value, ptr] -> []", doc: "Store through a pointer." }
  - { name: PtrRef,      code: 0x53, category: pointer, operands: [ { name: varIndex, enc: i32 } ], stack: "[] -> [ptr]", doc: "Pointer to local variable [varIndex] (`&x`)." }
  - { name: PtrRefIndex, code: 0x54, category: pointer, stack: "[array, index] -> [ptr]", doc: "Pointer to an array element (`&a[i]`)." }

  # ---- Native interop ----
  - { name: NativeCall, code: 0x43, category: native, operands: [ { name: poolIndex, enc: u16 }, { name: args, enc: "list<u8, vmtype>" } ], stack: "[receiver?, arg_args ... arg_1] -> [result?]", doc: "Invoke native-pool entry [poolIndex]; `args` carries call-site types for boundary conversion." }

  # ---- Actors / futures ----
  - { name: ActorSpawn, code: 0x60, category: actor, operands: [ { name: classFrameNum, enc: i32 }, { name: className, enc: utf }, { name: args, enc: i32 } ], stack: "[arg_args ... arg_1] -> [actor]", doc: "Instantiate an actor class: clone args, run constructor frame, push an actor handle." }
  - { name: ActorCall,  code: 0x61, category: actor, operands: [ { name: methodVarIndex, enc: i32 }, { name: args, enc: i32 } ], stack: "[actor, arg_args ... arg_1] -> [future]", doc: "Async cross-actor call; clone args, submit to the receiver, push a future[T]." }
  - { name: FutureAwait,code: 0x62, category: actor, stack: "[future] -> [value]", doc: "Block/park until a future completes; push its value (decoded into caller memory)." }
